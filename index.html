<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sassafras Initiative</title>
  <link rel="icon" href="public/sassafras-logo.PNG" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #171617;
      color: white;
      font-family: 'Cardo', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 80px 24px 80px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    /* ── Image ── */
    .photo {
      width: 50%;
      display: block;
      margin: 0 auto 48px;
    }

    /* ── Title ── */
    .title {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      line-height: 1.2;
      margin-bottom: 28px;
    }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid #d4d0c8;
      margin-bottom: 28px;
    }

    /* ── Blurb ── */
    .blurb {
      font-size: 1.05rem;
      font-style: italic;
      font-weight: 300;
      line-height: 1.75;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">

    <!--
-->
    <img class="photo" src="public/sassafras-logo.PNG" alt="Sassafras Initiative" />

    <h1 class="title">Sassafras Initiative</h1>

    <hr />

    <!--
      Replace the paragraph below with your call for submissions text
    -->
    <p class="blurb">
      Call for submissions text to follow.
    </p>

  </div>
</body>

</html>
